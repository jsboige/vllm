# Docker Compose profile for ZwZ-8B (Shared Mode - alongside Orpheus TTS)
# Deployed on GPU 2 alongside Orpheus 3B French TTS (~2.4 GB VRAM)
#
# Hardware: 1x RTX 4090 (shared GPU 2, 70% VRAM allocation = ~17.2GB)
# Model: AWQ 4-bit quantization (~5.5GB) - CREATED VIA quantize_zwz_8b.py
# Source: https://huggingface.co/inclusionAI/ZwZ-8B
#
# SHARED GPU CONFIG (alongside Orpheus TTS + Kokoro TTS):
#   - ZwZ-8B (this): port 5001, gpu-util 0.70 (~17 GB)
#   - Orpheus TTS:   port 8890, ~2.4 GB (llama.cpp + SNAC decoder)
#   - Kokoro TTS:    port 8880, ~0.5 GB
#   - Total: ~20 GB / 24.5 GB → 4.5 GB headroom
#   - CUDA graphs enabled (enough headroom without enforce-eager)
#
# Features: Vision (images), Fine-grained visual perception, Tool calling (hermes)
# Context: 32K tokens with FP8 KV cache (reduced from 128K solo mode)
#
# Run: docker compose -f myia_vllm/configs/docker/profiles/mini-zwz-shared.yml --env-file myia_vllm/.env up -d

services:
  vllm-mini-zwz-shared:
    image: vllm/vllm-openai:nightly-d106bf39f56cdc59d08a84094c0de41a0be9ad0f  # Mar 05 pinned nightly
    container_name: myia_vllm-mini-zwz
    command: >
      --host 0.0.0.0
      --port ${VLLM_PORT_MINI:-5001}
      --model /models/ZwZ-8B-AWQ-4bit
      --served-model-name zwz-8b
      --api-key ${VLLM_API_KEY_MINI}

      --gpu-memory-utilization 0.70
      --max-model-len 32768
      --max-num-batched-tokens 8192
      --kv-cache-dtype fp8
      --dtype half
      --max-num-seqs 32

      --enable-auto-tool-choice
      --tool-call-parser hermes
      --enable-prefix-caching

      --distributed-executor-backend mp

      --limit-mm-per-prompt '{"image":2,"video":0}'
      --mm-processor-kwargs '{"max_pixels":448000}'
      --skip-mm-profiling
    ipc: host
    shm_size: '4gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['2']
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - CUDA_VISIBLE_DEVICES=2
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - OMP_NUM_THREADS=4
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
    volumes:
      - d:/vllm/models:/models:ro
      - hf-cache:/root/.cache/huggingface
      - vllm-compile-cache:/root/.cache/vllm
    ports:
      - "${VLLM_PORT_MINI:-5001}:${VLLM_PORT_MINI:-5001}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT_MINI:-5001}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 240s
    restart: unless-stopped

# =====================================================================
# SHARED GPU MEMORY BUDGET (GPU 2 = 24.5 GB)
# =====================================================================
#
# Orpheus TTS (llama.cpp + SNAC):    ~2.4 GB (pre-allocated, always running)
# Kokoro TTS:                         ~0.5 GB
# ZwZ-8B vLLM (this service):
#   - Model weights (AWQ 4-bit):      ~5.5 GB
#   - Vision encoder (BF16):          ~0.6 GB
#   - CUDA graphs (piecewise):        ~3.0 GB (reduced context → smaller graphs)
#   - KV cache (FP8, 32K context):    ~5.0 GB
#   - Subtotal:                       ~14.1 GB
# Total GPU usage:                    ~17.0 GB
# Headroom:                            ~7.5 GB
#
# IF OOM: reduce gpu-memory-utilization to 0.60 or add --enforce-eager
# IF STILL OOM: reduce max-model-len to 16384

volumes:
  hf-cache:
  vllm-compile-cache:
