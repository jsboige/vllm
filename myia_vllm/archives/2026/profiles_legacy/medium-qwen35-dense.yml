# Docker Compose profile for Qwen3.5-27B (Dense, all 27B active)
# Evaluation candidate - benchmarked for completeness
#
# Hardware: 2x RTX 4090 (48GB VRAM) - GPUs 0,1
# Model: AWQ 4-bit quantization (~14GB) from cyankiwi
# Source: https://huggingface.co/cyankiwi/Qwen3.5-27B-AWQ-4bit
#
# ARCHITECTURE:
#   - Dense transformer (ALL 27B params active per token)
#   - Hybrid attention: Gated DeltaNet (linear) + Gated Attention (GQA)
#   - 64 layers, 24 Q / 4 KV heads, head dim 256
#   - Vision: Images, videos, documents (vision encoder in BF16)
#   - Thinking: <think>...</think> modulation
#   - Context: 262K native, configured at 128K
#
# EXPECTED LIMITATIONS:
#   - 27B active params → ~15-20 tok/s decode (similar to Qwen3-32B)
#   - Much slower than MoE variant (3B active = 50+ tok/s)
#   - Higher quality: SWE-bench 72.4% vs MoE 69.2%
#   - Benchmarked for quality comparison, likely not for production
#
# DEPLOYMENT:
#   Run: docker compose -f myia_vllm/configs/docker/profiles/medium-qwen35-dense.yml --env-file myia_vllm/.env up -d
#   Monitor: docker logs -f myia_vllm-medium-qwen35-dense

services:
  vllm-medium-qwen35-dense:
    image: vllm/vllm-openai:nightly
    container_name: myia_vllm-medium-qwen35-dense
    command: >
      --host 0.0.0.0
      --port ${VLLM_PORT_GLM:-5002}
      --model ${VLLM_MODEL_QWEN35_DENSE:-cyankiwi/Qwen3.5-27B-AWQ-4bit}
      --served-model-name qwen3.5-27b
      --api-key ${VLLM_API_KEY_MEDIUM}

      --tensor-parallel-size 2
      --gpu-memory-utilization 0.90
      --max-model-len 131072
      --kv-cache-dtype auto
      --dtype auto
      --max-num-batched-tokens 16384
      --max-num-seqs 32
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --distributed-executor-backend mp
      --disable-log-requests

      --limit-mm-per-prompt '{"image":4,"video":0}'
      --mm-processor-kwargs '{"max_pixels":774000}'
      --skip-mm-profiling
    ipc: host
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - VLLM_USE_DEEP_GEMM=0
      - OMP_NUM_THREADS=4
    volumes:
      - ${VLLM_MODELS_PATH:-./models}:/models:ro
      - ${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface
      - vllm-compile-cache-qwen35:/root/.cache/vllm
      - ./../../../middleware:/middleware:ro
      - ${VLLM_LOG_PATH:-./../../../logs}:/logs
    ports:
      - "${VLLM_PORT_GLM:-5002}:${VLLM_PORT_GLM:-5002}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT_GLM:-5002}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # 10 minutes: model download + CUDA graph capture
    restart: unless-stopped

  # Keepalive sidecar
  keepalive-qwen35-dense:
    image: curlimages/curl:latest
    container_name: myia_vllm-keepalive-qwen35-dense
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Keepalive started for Qwen3.5-27B (interval: 300s)"
        while true; do
          RESULT=$$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -X POST "http://vllm-medium-qwen35-dense:$${VLLM_PORT_GLM:-5002}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $${VLLM_API_KEY_MEDIUM}" \
            -d '{"model":"qwen3.5-27b","messages":[{"role":"user","content":"hi"}],"max_tokens":1,"temperature":0}')
          echo "$$(date '+%Y-%m-%d %H:%M:%S') Qwen3.5-Dense keepalive: HTTP $$RESULT"
          sleep 300
        done
    environment:
      - VLLM_API_KEY_MEDIUM=${VLLM_API_KEY_MEDIUM}
      - VLLM_PORT_GLM=${VLLM_PORT_GLM:-5002}
    depends_on:
      vllm-medium-qwen35-dense:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vllm-compile-cache-qwen35:  # Shared with MoE (same Qwen3 architecture family)

# =====================================================================
# NOTES
# =====================================================================
#
# === DENSE vs MoE ===
# NO --enable-expert-parallel (dense model, no experts)
# NO VLLM_USE_FLASHINFER_MOE_FP16 (no MoE layers)
# Lower max-num-batched-tokens (16384 vs 32768) - dense is memory-hungry
# Lower max-num-seqs (32 vs 64) - each seq uses more compute
#
# === KV CACHE BUDGET ===
# Model weights: ~14 GB / 2 GPUs = ~7 GB/GPU
# More headroom than MoE: ~15 GB/GPU for KV + CUDA graphs
# But dense KV cache is larger per token (~262 KB at FP16, ~131 KB at FP8)
# GatedDeltaNet layers use fixed state, reducing effective per-token cost
# Estimated context capacity: 80-120K tokens (verify at startup)
#
# === EXPECTED PERFORMANCE ===
# Dense 27B active → all params in forward pass
# Expected: ~15-20 tok/s decode (vs 50+ for MoE with 3B active)
# Concurrent: ~40-60 tok/s (vs 150+ for MoE)
# This profile is for QUALITY EVALUATION only
