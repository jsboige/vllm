# Docker Compose profile for Qwen3.5-35B-A3B GPTQ-Int4 (official Qwen quantization)
# A/B TEST vs current AWQ deployment (cyankiwi) — 2026-03-03
#
# Hardware: 2x RTX 4090 (48GB VRAM) - GPUs 0,1
# Model: GPTQ 4-bit quantization (official Qwen team)
# Source: https://huggingface.co/Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
#
# DIFFERENCES FROM AWQ PROFILE (medium-qwen35-moe.yml):
#   1. --model Qwen/Qwen3.5-35B-A3B-GPTQ-Int4 (instead of cyankiwi AWQ)
#   2. --quantization moe_wna16 (required for GPTQ MoE W4A16 dequant)
#   3. Separate compile cache (vllm-compile-cache-qwen35-gptq)
#   4. Different container name (myia_vllm-medium-qwen35-moe-gptq)
#   All other flags identical for fair comparison.
#
# DEPLOYMENT:
#   Run: docker compose -f myia_vllm/configs/docker/profiles/medium-qwen35-moe-gptq.yml --env-file myia_vllm/.env up -d
#   Monitor: docker logs -f myia_vllm-medium-qwen35-moe-gptq

services:
  vllm-medium-qwen35-moe-gptq:
    image: vllm/vllm-openai:nightly-7291d1b288558d48508e1a17c37b0aa170332264  # Same pinned image as AWQ for fair comparison
    container_name: myia_vllm-medium-qwen35-moe-gptq
    command: >
      --host 0.0.0.0
      --port ${VLLM_PORT_GLM:-5002}
      --model Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
      --served-model-name qwen3.5-35b-a3b
      --api-key ${VLLM_API_KEY_MEDIUM}
      --quantization moe_wna16

      --tensor-parallel-size 2
      --enable-expert-parallel
      --gpu-memory-utilization 0.85
      --max-model-len 262144
      --kv-cache-dtype fp8
      --dtype auto
      --max-num-batched-tokens 32768
      --max-num-seqs 64
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --distributed-executor-backend mp
      --disable-log-requests

      --limit-mm-per-prompt '{"image":4,"video":0}'
      --mm-processor-kwargs '{"max_pixels":774000}'
      --skip-mm-profiling
    ipc: host
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - VLLM_USE_DEEP_GEMM=0
      - OMP_NUM_THREADS=4
      - VLLM_USE_FLASHINFER_MOE_FP16=1
    volumes:
      - ${VLLM_MODELS_PATH:-./models}:/models:ro
      - ${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface
      - vllm-compile-cache-qwen35-gptq:/root/.cache/vllm
      - ./../../../middleware:/middleware:ro
      - ${VLLM_LOG_PATH:-./../../../logs}:/logs
    ports:
      - "${VLLM_PORT_GLM:-5002}:${VLLM_PORT_GLM:-5002}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT_GLM:-5002}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # 10 minutes: model download + CUDA graph capture
    restart: unless-stopped

  # Keepalive sidecar: prevents idle crash (CPython/pybind11 worker corruption)
  keepalive-qwen35-moe-gptq:
    image: curlimages/curl:latest
    container_name: myia_vllm-keepalive-qwen35-moe-gptq
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Keepalive started for Qwen3.5-35B-A3B GPTQ (interval: 120s)"
        while true; do
          RESULT=$$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -X POST "http://vllm-medium-qwen35-moe-gptq:$${VLLM_PORT_GLM:-5002}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $${VLLM_API_KEY_MEDIUM}" \
            -d '{"model":"qwen3.5-35b-a3b","messages":[{"role":"user","content":"hi"}],"max_tokens":1,"temperature":0}')
          echo "$$(date '+%Y-%m-%d %H:%M:%S') Qwen3.5-GPTQ keepalive: HTTP $$RESULT"
          sleep 120
        done
    environment:
      - VLLM_API_KEY_MEDIUM=${VLLM_API_KEY_MEDIUM}
      - VLLM_PORT_GLM=${VLLM_PORT_GLM:-5002}
    depends_on:
      vllm-medium-qwen35-moe-gptq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vllm-compile-cache-qwen35-gptq:  # Separate compile cache for GPTQ (different kernels than AWQ)
