# Docker Compose profile for Qwen3.5-35B-A3B (MoE, 256 experts, 3B active)
# PRODUCTION — replaces GLM-4.7-Flash on 2x RTX 4090 (deployed 2026-02-25)
#
# Hardware: 2x RTX 4090 (48GB VRAM) - GPUs 0,1
# Model: AWQ 4-bit quantization (~24GB) from cyankiwi
# Source: https://huggingface.co/cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit
#
# ARCHITECTURE:
#   - vLLM class: Qwen3VLMoeForConditionalGeneration
#   - Hybrid attention: Gated DeltaNet (linear, fixed state) + Gated Attention (standard KV)
#   - MoE: 256 experts, 9 active per token (8 routed + 1 shared) = 3B active
#   - Vision: Images, videos, documents (vision encoder preserved in BF16)
#   - Thinking: <think>...</think> modulation (enable_thinking: True/False)
#   - Context: 262K native (YaRN extensible to 1M), configured at 128K
#
# CAPABILITIES vs GLM-4.7-Flash:
#   + Vision support (GLM has none)
#   + Thinking modulation (Qwen3 parser vs GLM45)
#   + 262K native context (vs 200K)
#   + SWE-bench 69.2% (vs 59.2%)
#   + Same 3B active params → comparable decode speed expected
#   - No MLA (less efficient KV cache than GLM's 54 KB/token)
#
# DEPLOYMENT:
#   Run: docker compose -f myia_vllm/configs/docker/profiles/medium-qwen35-moe.yml --env-file myia_vllm/.env up -d
#   Monitor: docker logs -f myia_vllm-medium-qwen35-moe

services:
  vllm-medium-qwen35-moe:
    image: vllm/vllm-openai:nightly
    container_name: myia_vllm-medium-qwen35-moe
    command: >
      --host 0.0.0.0
      --port ${VLLM_PORT_GLM:-5002}
      --model ${VLLM_MODEL_QWEN35_MOE:-cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit}
      --served-model-name qwen3.5-35b-a3b
      --api-key ${VLLM_API_KEY_MEDIUM}

      --tensor-parallel-size 2
      --enable-expert-parallel
      --gpu-memory-utilization 0.92
      --max-model-len 262144
      --kv-cache-dtype fp8
      --dtype auto
      --max-num-batched-tokens 32768
      --max-num-seqs 64
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --distributed-executor-backend mp
      --disable-log-requests

      --limit-mm-per-prompt '{"image":4,"video":0}'
      --mm-processor-kwargs '{"max_pixels":774000}'
      --skip-mm-profiling
    ipc: host
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      - VLLM_USE_DEEP_GEMM=0
      - OMP_NUM_THREADS=4
      - VLLM_USE_FLASHINFER_MOE_FP16=1
    volumes:
      - ${VLLM_MODELS_PATH:-./models}:/models:ro
      - ${HF_CACHE_PATH:-~/.cache/huggingface}:/root/.cache/huggingface
      - vllm-compile-cache-qwen35:/root/.cache/vllm
      - ./../../../middleware:/middleware:ro
      - ${VLLM_LOG_PATH:-./../../../logs}:/logs
    ports:
      - "${VLLM_PORT_GLM:-5002}:${VLLM_PORT_GLM:-5002}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${VLLM_PORT_GLM:-5002}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s  # 10 minutes: model download + CUDA graph capture
    restart: unless-stopped

  # Keepalive sidecar: prevents idle crash (CPython/pybind11 worker corruption)
  keepalive-qwen35-moe:
    image: curlimages/curl:latest
    container_name: myia_vllm-keepalive-qwen35-moe
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Keepalive started for Qwen3.5-35B-A3B (interval: 300s)"
        while true; do
          RESULT=$$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -X POST "http://vllm-medium-qwen35-moe:$${VLLM_PORT_GLM:-5002}/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $${VLLM_API_KEY_MEDIUM}" \
            -d '{"model":"qwen3.5-35b-a3b","messages":[{"role":"user","content":"hi"}],"max_tokens":1,"temperature":0}')
          echo "$$(date '+%Y-%m-%d %H:%M:%S') Qwen3.5-MoE keepalive: HTTP $$RESULT"
          sleep 300
        done
    environment:
      - VLLM_API_KEY_MEDIUM=${VLLM_API_KEY_MEDIUM}
      - VLLM_PORT_GLM=${VLLM_PORT_GLM:-5002}
    depends_on:
      vllm-medium-qwen35-moe:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vllm-compile-cache-qwen35:  # Separate compile cache for Qwen3.5 (different kernels)

# =====================================================================
# TUNING NOTES
# =====================================================================
#
# === SEPARATE COMPILE CACHE ===
# Uses vllm-compile-cache-qwen35 (not shared with GLM) because:
# GatedDeltaNet attention compiles different kernels than MLA.
# Sharing cache would cause recompilation on every model switch.
#
# === GPU MEMORY BUDGET (estimated) ===
# Model weights (AWQ 4-bit): ~24 GB total / 2 GPUs = ~12 GB/GPU
# CUDA graphs overhead: ~4-6 GB/GPU
# Available for KV cache: ~4-6 GB/GPU
# KV cache per token: TBD (hybrid GatedDeltaNet + GQA)
#   - GatedDeltaNet layers: fixed state (O(d²)), NOT growing with context
#   - Gated Attention layers: standard KV cache, growing with context
# gpu-memory-utilization at 0.92 (matches GLM, validated stable)
# If OOM: reduce to 0.88 or reduce max-model-len to 131072
#
# === VISION ===
# Vision encoder (ViT): preserved in BF16 by cyankiwi AWQ quantization
# limit-mm-per-prompt: 4 images, no video (conserve memory for eval)
# max_pixels: 774000 (~880x880 resolution per image)
# For text-only mode: add --language-model-only to skip vision encoder
#
# === THINKING MODULATION ===
# Reasoning enabled by default (--reasoning-parser qwen3)
# To disable per-request, client sends at TOP LEVEL of request body:
#   "chat_template_kwargs": { "enable_thinking": false }
# NOTE: NOT inside extra_body — must be a top-level JSON field.
# OWUI can create a "no-think" model variant using this parameter.
#
# === FP8 KV CACHE (CONFIRMED WORKING, deployed 2026-02-25) ===
# Unlike GLM (MLA + TRITON_MLA), Qwen3.5 uses GatedDeltaNet + GQA.
# FP8 KV cache WORKS: doubles capacity from 206K to 438K tokens.
# Trade-off: ~15% decode speed loss (86 vs 96-109 tok/s).
# Worth it for multi-agent workloads needing concurrent context.
#
# === IF DOWNLOAD FAILS ===
# cyankiwi model on HuggingFace. If unavailable:
# 1. Download manually: huggingface-cli download cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit
# 2. Mount as local: --model /models/Qwen3.5-35B-A3B-AWQ-4bit
